<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Fitness Login Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #000;
        color: #fff;
      }

      .page {
        position: relative;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 16px;
      }

      .glow {
        position: absolute;
        border-radius: 999px;
        filter: blur(120px);
      }

      .glow-blue {
        top: -100px;
        left: -100px;
        width: 500px;
        height: 500px;
        background: rgb(59 130 246 / 20%);
      }

      .glow-purple {
        right: -100px;
        bottom: -100px;
        width: 400px;
        height: 400px;
        background: rgb(168 85 247 / 20%);
      }

      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 448px;
        padding: 32px;
        border: 1px solid rgb(255 255 255 / 10%);
        border-radius: 24px;
        background: rgb(255 255 255 / 5%);
        box-shadow: 0 25px 50px rgb(0 0 0 / 50%);
        backdrop-filter: blur(40px);
      }

      .header {
        margin-bottom: 32px;
        text-align: center;
      }

      .logo {
        display: grid;
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        place-items: center;
        border-radius: 16px;
        background: linear-gradient(135deg, #3b82f6, #9333ea);
        box-shadow: 0 10px 24px rgb(59 130 246 / 25%);
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.2;
      }

      p {
        margin: 8px 0 0;
        color: #9ca3af;
      }

      form {
        display: grid;
        gap: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #d1d5db;
        font-size: 14px;
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        height: 48px;
        padding: 0 16px;
        border: 1px solid rgb(255 255 255 / 10%);
        border-radius: 12px;
        outline: none;
        background: rgb(255 255 255 / 5%);
        color: #fff;
        font-size: 15px;
      }

      input:focus {
        border-color: #3b82f6;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 14px;
      }

      .checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        color: #9ca3af;
      }

      .link {
        border: 0;
        background: transparent;
        color: #60a5fa;
        cursor: pointer;
        font: inherit;
      }

      .primary {
        height: 48px;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(90deg, #3b82f6, #9333ea);
        color: #fff;
        cursor: pointer;
        font-weight: 700;
        box-shadow: 0 10px 24px rgb(59 130 246 / 20%);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 0;
        color: #6b7280;
        font-size: 14px;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgb(255 255 255 / 10%);
      }

      .google {
        height: 48px;
        border: 0;
        border-radius: 12px;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-weight: 600;
      }

      .bottom {
        margin-top: 32px;
        text-align: center;
        color: #6b7280;
        font-size: 14px;
      }

      .bottom span {
        color: #60a5fa;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="glow glow-blue"></div>
      <div class="glow glow-purple"></div>

      <section class="card" aria-label="Login card">
        <div class="header">
          <div class="logo" aria-hidden="true">
            <svg
              width="32"
              height="32"
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m6.5 6.5 11 11" />
              <path d="m21 21-1-1" />
              <path d="m3 3 1 1" />
              <path d="m18 22 4-4" />
              <path d="m2 6 4-4" />
              <path d="m3 10 7-7" />
              <path d="m14 21 7-7" />
            </svg>
          </div>
          <h1>Welcome Back</h1>
          <p>Login to continue to your AI Fitness Dashboard</p>
        </div>

        <form>
          <div>
            <label for="email">Email Address</label>
            <input id="email" type="email" placeholder="you@example.com" />
          </div>

          <div>
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter your password" />
          </div>

          <div class="row">
            <label class="checkbox">
              <input type="checkbox" />
              Remember me
            </label>
            <button class="link" type="button">Forgot password?</button>
          </div>

          <button class="primary" type="button" onclick="login()">
            Sign In
          </button>

          <div class="divider">OR</div>

          <button class="google" type="button">Continue with Google</button>
        </form>

        <div class="bottom">
          Don't have an account? <span>Create Account</span>
        </div>
      </section>
    </main>
    <script>
      function login() {
        sessionStorage.setItem("fitai_logged_in", "true");
        window.location.href = "preview-dashboard.html";
      }
    </script>
  </body>
</html>
